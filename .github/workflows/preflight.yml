name: Preflight CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Schema validation (LLM analysis contracts)
        run: uv run pytest tests/test_llm_analysis_client.py tests/test_models.py tests/test_reporter.py -v

      - name: Provider response parsing
        run: uv run pytest tests/test_tavily_provider.py tests/test_providers.py -v

      - name: Orchestrator smoke (full fixture-backed pipeline)
        run: uv run pytest tests/test_orchestrator.py tests/test_orchestration.py -v

      - name: CLI smoke (command entrypoint)
        run: uv run pytest tests/test_cli_research.py tests/test_research_run_service.py -v
